{% extends 'base.html' %}

{% block title %}Đăng ký - BookStore{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-4 text-primary"></i>
                    <h3 class="fw-bold mt-3">Đăng ký tài khoản</h3>
                    <p class="text-muted">Tạo tài khoản để mua sắm dễ dàng hơn</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">Họ</label>
                            <input type="text" name="first_name" class="form-control" value="{{ data.first_name|default:'' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">Tên</label>
                            <input type="text" name="last_name" class="form-control" value="{{ data.last_name|default:'' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Tên đăng nhập <span class="text-danger">*</span></label>
                        <input type="text" name="username" class="form-control" required value="{{ data.username|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                        <input type="email" name="email" class="form-control" required value="{{ data.email|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Số điện thoại</label>
                        <input type="tel" name="phone" class="form-control" value="{{ data.phone|default:'' }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" required minlength="6">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" name="password_confirm" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">
                        <i class="bi bi-person-plus me-2"></i>Đăng ký
                    </button>
                </form>
                
                <hr class="my-4">
                
                <p class="text-center mb-0">
                    Đã có tài khoản? <a href="{% url 'customer_login' %}" class="text-primary fw-medium">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
