{% extends 'base.html' %}

{% block title %}Đăng nhập - BookStore{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-book-half display-4 text-primary"></i>
                    <h3 class="fw-bold mt-3">Đăng nhập</h3>
                    <p class="text-muted">Chào mừng bạn quay trở lại!</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" required placeholder="Nhập tên đăng nhập">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                    </button>
                </form>
                
                <hr class="my-4">
                
                <p class="text-center mb-0">
                    Chưa có tài khoản? <a href="{% url 'customer_register' %}" class="text-primary fw-medium">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
